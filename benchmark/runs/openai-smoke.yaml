id: openai-smoke
description: Small OpenAI smoke run for validating benchmark v2 plumbing.
evidence_tier: smoke
models:
  - openai-text-embedding-3-large
tasks:
  - id: mrl_stress
    kwargs:
      max_samples: 12
      dimensions: [512, 256, 128]
  - id: needle_in_haystack
    kwargs:
      haystack_lengths: [1000]
      needle_positions: [0.0, 0.5, 1.0]
metadata:
  tier: smoke
  expected_cost: low
