models:
  - id: openai-text-embedding-3-large
    display_name: OpenAI text-embedding-3-large
    provider: openai
    provider_kwargs:
      model: text-embedding-3-large
    modalities: [text]
    dimensions: 3072
    max_text_length: 8191
    supports_mrl: true
    access: api
    api_key_env: OPENAI_API_KEY
    status: active
    priority: 10
    tags: [api, baseline, text, mrl]
    source: https://platform.openai.com/docs/guides/embeddings

  - id: openai-text-embedding-3-small
